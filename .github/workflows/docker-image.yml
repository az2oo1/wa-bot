name: Build and Publish Docker Image

# This tells GitHub to run this script every time you push code to the 'main' branch
on:
  push:
    branches: ['main'] 

env:
  REGISTRY: ghcr.io
  # This automatically uses your GitHub username and repository name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Grants the script permission to upload the finished image to your account
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is a temporary password automatically provided by Actions
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with 'latest'
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
