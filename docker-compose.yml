version: '3.8'

services:
  bot:
    # 'build: .' tells Docker to use the Dockerfile in this folder
    build: .
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm rebuild better-sqlite3 && node index.js"]